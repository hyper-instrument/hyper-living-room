; M5StickS3 smart-home hub
; - reads Xiaomi LYWSDCGQ temp/humidity over BLE (passive scan)
; - controls a Tapo P110M smart plug (AC) over local LAN (KLAP protocol)
; - serves a phone web UI at http://m5stick.local

[env:m5sticks3]
platform = espressif32@^6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; StickS3 = ESP32-S3-PICO-1-N8R8: 8MB flash, native USB
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    ; extra stack for JSON-RPC handling in the async_tcp task (MCP endpoint)
    -DCONFIG_ASYNC_TCP_TASK_STACK_SIZE=16384

lib_deps =
    m5stack/M5Unified@^0.2.18
    h2zero/NimBLE-Arduino@^2.2.3
    esp32async/AsyncTCP@^3.3.2
    esp32async/ESPAsyncWebServer@^3.7.0
    bblanchon/ArduinoJson@^7.3.0
